services:
  - type: web
    name: soundreverse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: soundreverse-v1
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_ENDPOINT
        value: "https://api.smith.langchain.com"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SONIC_MCP_URL
        sync: false
      - key: OUTPUT_DIR
        value: /tmp/soundreverse/outputs
      - key: UPLOAD_DIR
        value: /tmp/soundreverse/uploads
      - key: PRODUCTION
        value: "true"
      - key: CORS_ORIGINS
        sync: false
